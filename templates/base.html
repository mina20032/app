<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}كنيسة السيدة العذراء مريم – خدمة قديسي رابعة وخامسة وسادسة{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="h-full bg-gradient-to-br from-sky-50 via-indigo-50 to-slate-100">
    <div class="min-h-full flex flex-col">
      <!-- Header / Top bar only -->
      <header class="bg-gradient-to-r from-sky-600 to-indigo-600 shadow text-white">
        <div class="mx-auto max-w-7xl px-4 py-3 sm:px-6 lg:px-8 flex items-center justify-between">
          <div>
            <h1 class="text-sm sm:text-base font-semibold">
              كنيسة السيدة العذراء مريم – خدمة قديسي رابعة وخامسة وسادسة
            </h1>
            <p class="text-[11px] sm:text-xs text-sky-100 mt-0.5">
              {% block header %}لوحة التحكم{% endblock %}
            </p>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main class="flex-1">
        <div class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
