<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Church Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="w-full max-w-sm bg-white shadow-lg rounded-xl p-6">
      <h1 class="text-xl font-semibold text-gray-900 mb-4 text-center">Church Management Login</h1>

      {% if error %}
      <div class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Admin Password</label>
          <input
            type="password"
            name="password"
            required
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-slate-900 focus:ring-slate-900 text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full inline-flex justify-center items-center px-4 py-2 rounded-md bg-slate-900 text-white text-sm font-medium hover:bg-slate-800"
        >
          Login
        </button>
      </form>
    </div>
  </body>
</html>
